<!DOCTYPE html>
<html lang="tr">
<head>

<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
input, button { padding: 5px; width: 200px; margin-right: 10px; margin-bottom: 10px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background-color: #007BFF; color: white; }
tbody tr:nth-child(even) { background-color: #f2f2f2; }
#reportContainer { margin-top: 20px; }
.sheet-report { margin-top: 20px; padding: 15px; background: white; border-radius: 5px; border-left: 4px solid #007BFF; }

}

.sticky-note-btn-edit:hover  { background: #f59e0b !important; }

.sticky-note-add-area textarea {

.sticky-note-add-area textarea:focus {

.btn-save-note,

}
.btn-save-note   { background: #22c55e !important; color: white !important; }
.btn-save-note:hover   { background: #16a34a !important; }

<body>
<div class="page-header-row">
  <h2>Pompa Popülasyon Listesi Arama Motoru</h2>
  <div class="sticky-notes-panel" id="stickyNotesPanel">
    <div class="sticky-notes-header">
      <span>📝 Notlar</span>
      <button class="btn-add-note" id="btnAddNote">+ Ekle</button>
    </div>
    <div class="sticky-notes-list" id="stickyNotesList"></div>
    <div class="sticky-note-add-area" id="stickyNoteAddArea">
      <textarea id="stickyNoteInput" placeholder="Notunuzu yazın..."></textarea>
      <div class="sticky-note-add-actions">
        <button class="btn-cancel-note" id="btnCancelNote">İptal</button>
        <button class="btn-save-note" id="btnSaveNote">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<!-- Manual Input Panel -->
<div class="manual-input-panel">
  <h3>📋 Klasör Oluşturma Paneli</h3>
  
  <div class="input-row">
    <label>Seri No:</label>
    <input type="text" id="seriNo" placeholder="Seri numarası girin..." />
  </div>
  
  <div class="input-row">
    <label>Son Kullanıcı:</label>
    <input type="text" id="sonKullanci" placeholder="Son kullanıcı adı girin..." />
  </div>
  
  <div class="input-row">
    <label>Ürün Modeli:</label>
    <input type="text" id="urunModeli" placeholder="Ürün modeli girin..." />
  </div>
  
  <div class="input-row">
    <label>Klasör Oluştur ve Aç:</label>
    <input type="text" id="klasorYolu" placeholder="Klasör yolunu seçin (C:\\Pompa_Envanteri vb.)" />
  </div>
  
  <div class="button-row">
    <button class="btn-create-folder" id="btnCreateFolder">📁 Klasör Oluştur</button>
    <button class="btn-clear" id="btnClear">🔄 Temizle</button>
  </div>
  
  <div class="status-message" id="statusMessage"></div>
</div>

<input type="file" id="fileInput" accept=".csv, .xlsx"/>
<input type="text" id="searchInput" placeholder="Aramak istediğiniz değeri yazın..."/>
<button id="exportBtn">Raporu Excel olarak indir</button>
<div id="reportContainer">
<h3>Arama Raporu</h3>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let allSheetsData = {};
let sheetNames = [];

// ---- Folder Creation Functionality ----
document.getElementById('btnCreateFolder').addEventListener('click', function(){
    const seriNo = document.getElementById('seriNo').value.trim();
    const sonKullanci = document.getElementById('sonKullanci').value.trim();
    const urunModeli = document.getElementById('urunModeli').value.trim();
    const klasorYolu = document.getElementById('klasorYolu').value.trim();
    
    const statusMsg = document.getElementById('statusMessage');
    
    if(!seriNo || !sonKullanci || !urunModeli || !klasorYolu){
        statusMsg.className = 'status-message error';
        statusMsg.textContent = '❌ Lütfen tüm alanları doldurunuz!';
        return;
    }
    
    // Create folder name: SerialNo_SonKullanci_UrunModeli
    const folderName = `${seriNo}_${sonKullanci}_${urunModeli}`.replace(/\s+/g, '_');
    const fullPath = `${klasorYolu}\\${folderName}`;
    
    // Note: This is a browser-based limitation - we can't directly create folders on the user's PC
    // Instead, we'll provide instructions and save data to localStorage
    try {
        // Save folder creation request to localStorage for potential Electron/Node.js backend
        const folderData = {
            serialNo: seriNo,
            endUser: sonKullanci,
            productModel: urunModeli,
            basePath: klasorYolu,
            folderName: folderName,
            fullPath: fullPath,
            createdAt: new Date().toISOString()
        };
        
        let folderHistory = JSON.parse(localStorage.getItem('folderHistory') || '[]');
        folderHistory.push(folderData);
        localStorage.setItem('folderHistory', JSON.stringify(folderHistory));
        
        statusMsg.className = 'status-message success';
        statusMsg.innerHTML = `✅ <strong>Klasör bilgisi kaydedildi!</strong><br>
        Oluşturulacak Klasör Adı: <strong>${folderName}</strong><br>
        Tam Yol: <strong>${fullPath}</strong><br>
        <em>Not: Tarayıcı güvenlik nedeniyle klasör otomatik olarak oluşturulamaz. Lütfen klasörü manuel olarak oluşturunuz veya masaüstü uygulaması kullanınız.</em>`;
        
        // Clear inputs after success
        setTimeout(() => {
            document.getElementById('seriNo').value = '';
            document.getElementById('sonKullanci').value = '';
            document.getElementById('urunModeli').value = '';
        }, 1500);
        
    } catch(err){
        statusMsg.className = 'status-message error';
        statusMsg.textContent = '❌ Hata: ' + err.message;
    }
});

document.getElementById('btnClear').addEventListener('click', function(){
    document.getElementById('seriNo').value = '';
    document.getElementById('sonKullanci').value = '';
    document.getElementById('urunModeli').value = '';
    document.getElementById('klasorYolu').value = '';
    document.getElementById('statusMessage').className = 'status-message';
    document.getElementById('statusMessage').textContent = '';
});

// ---- File Upload and Search Functionality ----
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return alert("Dosya seçmediniz!");
    const reader = new FileReader();
    reader.onload = function(e){
        try{
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data,{ type:'array' });
            
            allSheetsData = {};
            sheetNames = workbook.SheetNames;
            
            sheetNames.forEach(sheetName => {
                const worksheet = workbook.Sheets[sheetName];
                const raw = XLSX.utils.sheet_to_json(worksheet, { header:1, defval:"" });
                
                if(raw.length > 0){
                    const headers = raw[0];
                    const rows = raw.slice(1).map(row=>{
                        const obj = {};
                        headers.forEach((h,i)=>obj[h] = row[i] ?? "");
                        return obj;
                    });
                    
                    allSheetsData[sheetName] = {
                        headers: headers,
                        rows: rows
                    };
                }
            });
            
            renderReport({});
            alert(`Dosya yüklendi! Toplam ${sheetNames.length} sayfa bulundu. (${Object.keys(allSheetsData).length} geçerli sayfa)`);
        }catch(err){
            console.error(err);
            alert("Dosya okunamadı!");
        }
    };
    reader.readAsArrayBuffer(file);
});

function debounce(func, wait){
    let timeout;
    return function(...args){
        clearTimeout(timeout);
        timeout = setTimeout(()=>func.apply(this,args), wait);
    };
}

document.getElementById('searchInput').addEventListener('input', debounce(function(e){
    const query = e.target.value.trim().toLowerCase();
    const results = {};
    
    Object.keys(allSheetsData).forEach(sheetName => {
        const { headers, rows } = allSheetsData[sheetName];
        const filteredRows = query 
            ? rows.filter(row => Object.values(row).some(val=>String(val).toLowerCase().includes(query)))
            : [];
        
        if(filteredRows.length > 0){
            results[sheetName] = {
                headers: headers,
                rows: filteredRows
            };
        }
    });
    
    renderReport(results);
}, 300));

function renderReport(data){
    const reportContainer = document.getElementById('reportContainer');
    const hasTitle = reportContainer.querySelector('h3');
    
    while(reportContainer.children.length > 1){
        reportContainer.removeChild(reportContainer.lastChild);
    }
    
    if(Object.keys(allSheetsData).length === 0){
        return;
    }
    
    if(Object.keys(data).length === 0 && document.getElementById('searchInput').value.trim() !== ''){
        const noResultsDiv = document.createElement('div');
        noResultsDiv.style.padding = '20px';
        noResultsDiv.style.color = '#999';
        noResultsDiv.textContent = 'Sonuç bulunamadı!';
        reportContainer.appendChild(noResultsDiv);
        return;
    }
    
    Object.keys(data).forEach(sheetName => {
        const { headers, rows } = data[sheetName];
        
        const sheetDiv = document.createElement('div');
        sheetDiv.className = 'sheet-report';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'sheet-title';
        titleDiv.textContent = `📄 ${sheetName}`;
        sheetDiv.appendChild(titleDiv);
        
        const countDiv = document.createElement('div');
        countDiv.className = 'result-count';
        countDiv.textContent = `Bulunan Satır: ${rows.length}`;
        sheetDiv.appendChild(countDiv);
        
        const table = document.createElement('table');
        
        const thead = document.createElement('thead');
        const headRow = document.createElement('tr');
        headers.forEach(h=>{
            const th = document.createElement('th');
            th.textContent = h;
            headRow.appendChild(th);
        });
        thead.appendChild(headRow);
        table.appendChild(thead);
        
        const tbody = document.createElement('tbody');
        rows.forEach(row=>{
            const tr = document.createElement('tr');
            headers.forEach(h=>{
                const td = document.createElement('td');
                td.textContent = row[h] ?? "";
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        
        sheetDiv.appendChild(table);
        reportContainer.appendChild(sheetDiv);
    });
}

document.getElementById('exportBtn').addEventListener('click', function(){
    const sheetReports = document.querySelectorAll('.sheet-report');
    
    if(sheetReports.length === 0){
        return alert("Dışa aktarılacak veri yok!");
    }
    
    const wb = XLSX.utils.book_new();
    let totalRows = 0;
    
    sheetReports.forEach(sheetReport => {
        const titleText = sheetReport.querySelector('.sheet-title').textContent.replace('📄 ', '');
        const table = sheetReport.querySelector('table');
        const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent);
        const rows = Array.from(table.querySelectorAll('tbody tr')).map(tr => 
            Array.from(tr.children).map(td => td.textContent)
        );
        
        totalRows += rows.length;
        
        const ws_data = [headers, ...rows];
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, titleText);
    });
    
    let serialNo = "Rapor";
    const firstSheetReport = document.querySelector('.sheet-report');
    if(firstSheetReport){
        const firstTable = firstSheetReport.querySelector('table');
        const serialIdx = Array.from(firstTable.querySelectorAll('thead th')).findIndex(th => th.textContent === "Serial No");
        if(serialIdx !== -1){
            const firstRow = firstTable.querySelector('tbody tr');
            if(firstRow){
                serialNo = Array.from(firstRow.children)[serialIdx].textContent;
            }
        }
    }
    
    const fileName = `${serialNo}_Pompa_Listesi.xlsx`;
    XLSX.writeFile(wb, fileName);
});

// ---- Sticky Notes ----
(function() {
    const STORAGE_KEY = 'pompaNotlari';
    let editingId = null;

    function loadNotes() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch(e) { return []; }
    }

    function saveNotes(notes) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderNotes() {
        const notes = loadNotes();
        const list = document.getElementById('stickyNotesList');
        if (!list) return;
        if (notes.length === 0) {
            list.innerHTML = '<div class="sticky-notes-empty">Henüz not eklenmedi</div>';
            return;
        }
        list.innerHTML = notes.map(function(note) {
            return '<div class="sticky-note-item" data-id="' + note.id + '">' +
                '<div class="sticky-note-text">' + escapeHtml(note.text) + '</div>' +
                '<div class="sticky-note-actions">' +
                  '<button class="sticky-note-btn-edit" data-id="' + note.id + '">✏️</button>' +
                  '<button class="sticky-note-btn-delete" data-id="' + note.id + '">🗑️</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function showAddArea(prefillText, id) {
        const area = document.getElementById('stickyNoteAddArea');
        const input = document.getElementById('stickyNoteInput');
        editingId = id || null;
        input.value = prefillText || '';
        area.style.display = 'flex';
        input.focus();
    }

    function hideAddArea() {
        const area = document.getElementById('stickyNoteAddArea');
        area.style.display = 'none';
        editingId = null;
        document.getElementById('stickyNoteInput').value = '';
    }

    function saveNote() {
        const input = document.getElementById('stickyNoteInput');
        const text = input.value.trim();
        if (!text) { input.focus(); return; }
        const notes = loadNotes();
        if (editingId) {
            const idx = notes.findIndex(function(n) { return n.id === editingId; });
            if (idx !== -1) notes[idx].text = text;
        } else {
            notes.push({ id: String(Date.now()) + '-' + Math.random().toString(36).substr(2, 9), text: text });
        }
        saveNotes(notes);
        renderNotes();
        hideAddArea();
    }

    function deleteNote(id) {
        saveNotes(loadNotes().filter(function(n) { return n.id !== id; }));
        renderNotes();
    }

    function editNote(id) {
        const note = loadNotes().find(function(n) { return n.id === id; });
        if (note) showAddArea(note.text, id);
    }

    document.getElementById('btnAddNote').addEventListener('click', function() { showAddArea(); });
    document.getElementById('btnSaveNote').addEventListener('click', saveNote);
    document.getElementById('btnCancelNote').addEventListener('click', hideAddArea);

    document.getElementById('stickyNoteInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { saveNote(); }
        if (e.key === 'Escape') { hideAddArea(); }
    });

    document.getElementById('stickyNotesList').addEventListener('click', function(e) {
        const editBtn = e.target.closest('.sticky-note-btn-edit');
        const delBtn  = e.target.closest('.sticky-note-btn-delete');
        if (editBtn) editNote(editBtn.dataset.id);
        if (delBtn)  deleteNote(delBtn.dataset.id);
    });

    renderNotes();
})();
</script>
